<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coin Flip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Coin Flip</h1>

<button onclick="flip()">Flip</button>

<h2 id="coin">🪙 -</h2>

<script>
function flip(){
  const result = Math.random() < 0.5 ? "Heads" : "Tails";
  document.getElementById("coin").innerText = "🪙 " + result;
}
</script>

</body>
</html>
