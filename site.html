<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Number Generator</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        font-family: Arial, sans-serif;
        color: white;
    }

    .card {
        background: rgba(255,255,255,0.05);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        width: 300px;
    }

    h1 {
        margin-bottom: 20px;
    }

    input {
        width: 80px;
        padding: 8px;
        border-radius: 8px;
        border: none;
        margin: 5px;
        text-align: center;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2563eb;
        transform: scale(1.05);
    }

    .result {
        margin-top: 20px;
        font-size: 32px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Random Number</h1>

    <div>
        <input id="min" placeholder="Min" type="number">
        <input id="max" placeholder="Max" type="number">
    </div>

    <button onclick="generate()">Generate</button>

    <div class="result" id="result">-</div>
</div>

<script>
function generate() {
    let min = parseInt(document.getElementById("min").value);
    let max = parseInt(document.getElementById("max").value);

    if (isNaN(min) || isNaN(max)) {
        document.getElementById("result").innerText = "Enter numbers";
        return;
    }

    let num = Math.floor(Math.random() * (max - min + 1)) + min;

    document.getElementById("result").innerText = num;
}
</script>

</body>
</html>
